<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>USSD — ShohojToll</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .phone {
      width: 320px;
      background: #1a1f1a;
      border: 10px solid #2b2f2b;
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 8px 40px rgba(0,255,0,0.08);
    }
    .brand {
      color: #6f6;
      font-size: 11px;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 10px;
    }
    .screen {
      background: #0a140a;
      color: #a6ffa6;
      font-family: "Consolas", "Courier New", monospace;
      white-space: pre-wrap;
      padding: 14px;
      min-height: 180px;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1.45;
    }
    form { margin-top: 12px; }
    label {
      display: block;
      color: #6f6;
      font-size: 11px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #2f5c2f;
      background: #081608;
      color: #d5ffd5;
      font-family: monospace;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #2f5c2f;
      color: #d5ffd5;
      border: 0;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
    }
    a.restart {
      display: block;
      margin-top: 10px;
      text-align: center;
      color: #888;
      font-size: 12px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="brand">NOKIA • USSD SESSION</div>
    <div class="screen">{{ display }}</div>

    {% if screen == "dial" %}
      <form method="post" action="/ussd">
        <input type="hidden" name="state" value="{{ next_state }}"/>
        <button type="submit">DIAL *999#</button>
      </form>

    {% elif screen in ("menu", "plate", "pin") %}
      <form method="post" action="/ussd">
        <input type="hidden" name="state" value="{{ next_state }}"/>
        {% for k, v in hidden.items() %}
          <input type="hidden" name="{{ k }}" value="{{ v }}"/>
        {% endfor %}
        {% if screen == "menu" %}
          <label>{{ input_label }}</label>
          <input type="text" name="choice" inputmode="numeric" maxlength="1"
                 autocomplete="off" autofocus required/>
        {% elif screen == "plate" %}
          <label>{{ input_label }}</label>
          <input type="text" name="plate" autocomplete="off" autofocus
                 placeholder="e.g. DHAKA-METRO-GA-11-1234" required/>
        {% elif screen == "pin" %}
          <label>{{ input_label }}</label>
          <input type="password" name="pin" inputmode="numeric" maxlength="5"
                 autocomplete="off" autofocus required/>
        {% endif %}
        <button type="submit">SEND</button>
      </form>

    {% else %}
      <a class="restart" href="/ussd">⟲ new session</a>
    {% endif %}
  </div>
</body>
</html>
